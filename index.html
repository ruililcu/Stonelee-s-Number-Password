<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonelee's Number Password</title>
    <style>
        body
        {
            font-family:"Cascadia Mono",sans-serif;
            color:limegreen;
            min-height:100vh;
            transition:all 1s ease;
        }
        h1
        {
            text-align:center;
            font-family:"Poppins","Cascadia Mono",sans-serif;
        }
        h2{color:lightgreen;}
        button
        {
            font-family:"Cascadia Code",sans-serif;
            color:white;
            background-color:rgba(123,130,140,123);
            transition:all 0.4s ease;
        }
        button:hover
        {
            background-color:#6e82af;
            box-shadow:0 0 3px white,0 0 7px silver;
            transform:scale(1.2);
        }
        button:active
        {
            transform:scale(0.9);
        }
        .member-label
        {
            display:inline-block;
            width:40px;
            height:20px;
            color:#27e923;
            font-family:'Comic Sans MS';
            transition:color 1s ease,transform 0.4s ease;
        }
        .member-label
        {
            display:inline-block;
            width:40px;
            height:20px;
            font-family:'Comic Sans MS';
            color: #27e923; 
        }
        .alive { color:#27e923; }
        .dead { color:#e92723; }
        .move-out { color:#2327e9; }
        .alive
        {
            color:#27e923;
        }
        .dead
        {
            color:#e92723;
        }
        .move-out
        {
            color:#2327e9;
        }
        .players-container
        {
            width:500px; 
        }
    </style>
</head>
<body>
    <h1>Stonelee's Number Password</h1>
    <p>
        有一个组织,内部潜入了一些坏人,<br>
        它们每天都会淘汰组织中的人,<br>
        而你,我聪明的侦探,<br>
        可以让人离开组织,<br>
        以此把坏人全都除掉...
    </p>
    <div id="day">
        <input type="text" id="playerInput" placeholder="你想让谁离开组织?">
        <button id="checkBtn" onclick="checkInput()">查看发言</button>
        <button id="moveOut" style="display: none;">确认移除(进入夜晚)</button>
    </div>
    <p id="AIresponse"></p>
    <h2 >所有成员存活状态（绿色=存活,红色=被坏人淘汰,蓝色=移除）</h2>
    <div class="players-container" id="playersStatus"></div>
    <script>
        const mafiaRatio=(Math.random()+1)/20;
        let Game=
        {
            players:[],     
            gameStarted:false,
            level:3
        };
        let input=0;
        let mafiaCount=0;
        let civilianCount=0;
        let captainCount=1;
        let usedToday=new Set();
        let dayCount=1;
        document.getElementById("moveOut").addEventListener('click',function() {
            const targetPlayer = Game.players.find(player=>player.id==Number(input));
            if (targetPlayer) { 
                targetPlayer.isAlive=2;
                renderPlayersStatus();
                document.getElementById('moveOut').style.display="none";
                getNewCount();
                night();
            } else {
                document.getElementById('AIresponse').textContent=`!成员${input}不存在!`;
            }
        });
        const delay=(ms)=>new Promise(resolve=>setTimeout(resolve,ms));
        
        function initGame()
        {
            mafiaCount = Math.floor((Game.level*40-20) * mafiaRatio)
            civilianCount = (Game.level*40-20) - mafiaCount - captainCount; 
            Game.players = []; 
            for (let i = 0; i < mafiaCount; i++) {
                Game.players.push({
                    id: 0, 
                    role: 'mafia',
                    isAlive:1 
                });
            }
            Game.players.push({
                id: 0,
                role: 'captain',
                isAlive:1
            });
            for (let i = 0; i < civilianCount; i++) { 
                Game.players.push({
                    id: 0,
                    role: 'civilian',
                    isAlive:1
                });
            }
            Game.players.sort(() => Math.random() - 0.5);
            Game.players.forEach((player, index) => {
                player.id = index + 1; 
            });
            Game.gameStarted = true;
            getNewCount();
            renderPlayersStatus();
        }
        
        function checkInput()
        {
            input = document.getElementById('playerInput').value.trim();
            if(!input || isNaN(input)) 
            {
                document.getElementById('AIresponse').textContent='请输入有效的成员编号(例如3)';
                return;
            }
            const targetPlayer = Game.players.find(player=>player.id===Number(input));
            if (!targetPlayer) {
                document.getElementById('AIresponse').textContent=`!成员${input}不存在!`;
                document.getElementById('moveOut').style.display="none";
                return;
            }
            if (targetPlayer.isAlive !== 1) {
                document.getElementById('AIresponse').textContent=`成员${input}已经被淘汰/移除,无法操作!`;
                document.getElementById('moveOut').style.display="none";
                return;
            }
            
            document.getElementById('AIresponse').innerHTML=getResponse(input);
            renderPlayersStatus();
            document.getElementById('moveOut').style.display="inline";
            document.getElementById('checkBtn').style.display="inline";
        }
        function renderPlayersStatus()
        {
            const container = document.getElementById('playersStatus');
            container.innerHTML = ''; 
            let row = document.createElement('div');
            row.style.marginBottom = '10px';

            Game.players.forEach((player, index) =>
            {
                if (index > 0 && index % 10 == 0) {
                    container.appendChild(row);
                    row = document.createElement('div');
                    row.style.marginBottom = '9px';
                }
                const l = document.createElement('div');
                l.className = 'member-label';
                l.innerHTML = `<div style="font-weight:bold;">#${player.id}</div>`;
                setTimeout(()=>
                {
                    if (player.isAlive==1)
                    {
                        l.classList.add('alive');
                    }
                    else if(player.isAlive==2)
                    {
                        l.classList.add('move-out');
                    }
                    else
                    {
                        l.classList.add('dead');
                    }
                },20);
                row.appendChild(l);
            });

            container.appendChild(row);
        }
        function getResponse(playerId)
        {
            ans=""; 
            if(usedToday.has(Number(input)))return `${playerId}:我今天被你问过了啊`;
            usedToday.add(Number(input));
            let p=Game.players.find(player=>player.id===Number(playerId));
            if (p.role === "civilian")
            {
                ans+=Math.random() > 0.5 
                    ?`${playerId}:我是好人,你别误解我了` 
                    :`${playerId}:我...我是一个好人!绝对不是坏人`;
            }
            else if (p.role=="mafia")
            {
                ans+=Math.random()>0.9 
                    ?`${playerId}:我...我是一个坏人!...不是,是好人!`
                    :Math.random()>0.7
                    ?`${playerId}:我...我是一个好人!绝对不是坏人`
                    :`${playerId}:我是好人,你别误解我了`
            }
            else if (p.role=="captain")
            {
                ans+=`提示:${playerId}为好人队长`;
            }
            if(captainCount>0)
            {
                const captain=Game.players.find(p=>p.role=="captain"&&p.isAlive==1);
                if(captain&&playerId!=captain&&playerId!=_left(captain)&&
                playerId!=_right(captain)&&playerId!=_up(captain)&&playerId!=_down(captain))ans+=captainHint();
            }
            for(const pid of [_up(playerId),_down(playerId),_left(playerId),_right(playerId)])
            {
                var person=Game.players.find(p=>p.id==pid);
                if (!person||person.isAlive!=1) continue;
                if(person.role=="captain")ans+=captainHint();
                else if(person.role=="civilian")
                {
                    ans+=`<br>${person.id}:${playerId}是[${p.role=="mafia"?"坏人":"好人"}]!`;
                }
                else
                {
                    ans+=`<br>${person.id}:${playerId}是[${p.role=="mafia"?"好人":"坏人"}]!`;
                }
            }
            return ans;
        }
        function captainHint()
        {
            var res="";
            let randChance=Math.random();
            if(randChance>0.93)
            {
                res+=`<br>[队长]${captain.id}:成员${playerId}疑似[${p.role=="mafia"?"坏人":"好人"}]`;
            }
            else if (randChance>0.85)
            {
                let fakeRole=Math.random()>0.3?"好人":"坏人";
                res+=`<br>[队长]${captain.id}:成员${playerId}疑似[${fakeRole}]`;
            }
            return res;
        }
        function renderPlayersStatus() {
            const container = document.getElementById('playersStatus');
            container.innerHTML = ''; 
            let row = document.createElement('div');
            row.style.marginBottom = '10px';
            Game.players.forEach((player, index)=>
            {
                if (index > 0 && index % 10 == 0) {
                    container.appendChild(row);
                    row = document.createElement('div');
                    row.style.marginBottom = '9px';
                }
                const l = document.createElement('div');
                l.className=`member-label`;
                l.classList.add('alive'); 
                if (player.isAlive === 1)
                {
                    l.classList.replace('alive', 'alive'); 
                }
                else if (player.isAlive === 2)
                {
                    l.classList.replace('alive', 'move-out');
                } else {
                    l.classList.replace('alive', 'dead');
                }
                l.innerHTML=`<div style="font-weight:bold;">#${player.id}</div>`;
                row.appendChild(l);
            });
            container.appendChild(row);
        }
        function killRandomPlayer()
        {
            if(!Game.gameStarted)return;
            const alivePlayers = Game.players.filter(p=>p.isAlive==1);
            const aliveCivilianPlayers=Game.players.filter(p => p.role=="civilian"&&p.isAlive==1);
            if (aliveCivilianPlayers.length<=10)
            {
                alert('GAME OVER');
                return;
            }
            const aliveNonMafia = alivePlayers.filter(p => p.role!=="mafia");
            const target = aliveNonMafia.length > 0 ? aliveNonMafia : alivePlayers;
            const randomIndex = Math.floor(Math.random() * target.length);
            target[randomIndex].isAlive=0;
            renderPlayersStatus();
        }
        function getNewCount()
        {
            civilianCount=0;
            mafiaCount=0;
            captainCount=0;
            Game.players.forEach(player => {
                if (player.isAlive==1) {
                    switch (player.role) {
                        case 'civilian':
                            civilianCount++;
                            break;
                        case 'mafia':
                            mafiaCount++;
                            break;
                        case 'captain':
                            captainCount++;
                            break;
                        default:
                            console.warn(`!未知角色${player.role}!`);
                    }
                }
            });
            if(mafiaCount==0)alert("坏人被清除了,组织回归了安宁...");
        }
        function day()
        {
            dayCount++;
            document.getElementById("AIresponse").textContent=`第${dayCount}天`;
            document.body.style.backgroundColor="white";
            document.getElementById("day").style.display="block"; 
            usedToday=new Set();
        }
        async function night()
        {
            document.getElementById("AIresponse").textContent=`天黑了,坏人开始行动...(第${dayCount}夜)`;
            document.body.style.backgroundColor="black";
            document.getElementById("day").style.display="none";
            for(let i=1;i<=Math.ceil(mafiaCount*(Math.random()));i++)
            {
                killRandomPlayer();
                getNewCount();
                await delay(800); 
            }
            day();
        }
        function _left(x){return ((x-1)%(Game.level*40-20)+(Game.level*40-20)-1)%(Game.level*40-20)+1;}
        function _right(x){return ((x+1)%(Game.level*40-20)+(Game.level*40-20)-1)%(Game.level*40-20)+1;}
        function _up(x){return ((x+10)%(Game.level*40-20)+(Game.level*40-20)-1)%(Game.level*40-20)+1;}
        function _down(x){return ((x-10)%(Game.level*40-20)+(Game.level*40-20)-1)%(Game.level*40-20)+1;}
        initGame();
    </script>
</body>
</html>
