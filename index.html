<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonelee's Number Password</title>
    <style>
        body
        {
            font-family:"Cascadia Mono",sans-serif;
            color:limegreen;
            min-height:100vh;
            transition:all 1s ease;
        }
        h1
        {
            text-align:center;
            font-family:"Cascadia Mono",sans-serif;
        }
        h2{color:lightgreen;}
        input
        {
            border-radius:7px;
            border:1px solid #ddeeff;
            padding:10px 14px; 
            outline:none;
            transition:all 250ms ease; 
        }
        input:focus
        {
            border-color:limegreen; 
            box-shadow:0 0 3px white,0 0 7px silver;
        }
        button
        {
            font-family:"Cascadia Code",sans-serif;
            color:white;
            border-radius:2px;
            background-color:rgba(123,130,140,0.3);
            transition:all 0.4s ease;
        }
        button:hover
        {
            background-color:#6e82af;
            box-shadow:0 0 3px white,0 0 7px silver;
            transform:scale(1.1);          
        }
        button:active
        {
            transform:scale(0.9);
        }
        .member-label
        {
            display:inline-block;
            width:60px;
            height:20px;
            color:#27e923;
            font-family:'Comic Sans MS';
            transition:color 1s ease,transform 0.4s ease;
        }
        .alive { color:#2dd47b;}
        .dead { color:#e63743;text-decoration:line-through;}
        .move-out { color:#2f50e2;text-decoration:line-through;}
        .used { color:#836b4d;text-decoration:underline;}
        .players-container
        { 
            width:600px;
            background:rgba(100,150,190,0.05);
            border-radius:7px;
            overflow:hidden;
        }
        .css-fold input {display:none;}
        .css-fold .fold-title {cursor:pointer;display:block;padding:7px;border-radius:7px;background:rgba(140,140,140,0.2);}
        .css-fold .fold-content {background:rgba(100,100,190,0.2);max-height:0;overflow:hidden;
            padding:0 12px;transition:250ms;border-radius:7px;}
        .css-fold input:checked~.fold-content {max-height:500px;padding:12px;}
        .css-fold input:checked~.fold-title::after {content:"▼";}
        .css-fold .fold-title::after {content:"▶";}
        .talk
        {
            text-align:center;
            border:5px ridge #ddeeff;
            border-radius:7px;
            width:500px;
            padding:15px;
            color:grey;
        }
    </style>
</head>
<body>
    <h1>数字密码</h1>
    <p style="text-align:center;">Stonelee's Number Password🔢</p>
    <h3>V1.0β</h3>
    <label class="css-fold">
    <input type="checkbox">
    <h4 class="fold-title">背景&规则</h4>
    <div class="fold-content">
        <p>
            一个平静的组织,被暗处的坏人悄然渗透,<br>
            每一个夜晚,都有无辜者被残忍淘汰,<br>
            而你,我聪明的侦探,是组织唯一的希望——<br>
            你有权将可疑人员逐出组织,找出坏人,<br>
            以此把坏人全都除掉...
        </p>
        <div style="color:orange;">
            游戏规则📕:
                <hr>1.【白天阶段】<br>
                -输入成员编号发起质询,通过发言与证词判断身份<br>
                -确认移除嫌疑人员后,进入夜晚阶段<br>
                <hr>2.【夜晚阶段】<br>
                -每一名坏人,都有50%的概率淘汰1名无辜好人(坏人有极低概率互相淘汰)<br>
                <hr>3.【胜负条件】<br>
                -失败:存活好人数量≤10→???<br>
                -胜利:成功移除所有坏人→组织重归安宁,前进一关<br>
        </div>
    </div>
    </label>
    <p id="gameLevel">第1关</p>
    <div id="day" style="text-align:center;">
        请选择要移除的成员编号:
        <input type="text" id="playerInput" placeholder="你想让谁离开组织?">
        <button id="checkBtn" onclick="checkInput()" style="background-color:#66acaf;">查看证词</button>
        <button id="moveOut" style="display:none;background-color:#6823e9;">确认移除·进入夜晚</button>
    </div>
    <br>
    <div id="AIresponse" class="talk">此处显示对话及通知</div>
    <br>
    <h2>所有成员存活状态(状态表下为释义)</h2>
    <div class="players-container" id="playersStatus"></div>
    <label class="css-fold">
        <input type="checkbox">
        <h4 class="fold-title">🟢成员状态说明</h4>
        <div class="fold-content" style="line-height:0.9;">
            <p style="color:#2dd47b;">存活</p>
            <p style="color:#e63743; text-decoration:line-through;">被坏人淘汰</p>
            <p style="color:#2f50e2; text-decoration:line-through;">被你移除</p>
            <p style="color:#836b4d; text-decoration:underline;">今日已被你质询过</p>
            <p style="color:#66acaf;">当前正在审问的目标</p>
            <p style="color:#7d5cbc;">当前审问的证人(即深青色上下左右的人)</p>
        </div>
    </label>
    <script>
        const mafiaRatio=(Math.random()+1)/20;
        let Game=
        {
            players:[],     
            gameStarted:false,
            level:1
        };
        let input=0;
        let mafiaCount=0;
        let civilianCount=0;
        let captainCount=1;
        let usedToday=new Set();
        let dayCount=1;
        let line="main"
        document.getElementById("moveOut").addEventListener('click',function() {
            const targetPlayer = Game.players.find(player=>player.id==Number(input));
            if (targetPlayer) { 
                targetPlayer.isAlive=2;
                renderPlayersStatus();
                document.getElementById('moveOut').style.display="none";
                getNewCount();
                night();
            } else {
                document.getElementById('AIresponse').textContent=`!成员${input}不存在!`;
            }
        });
        const delay=(ms)=>new Promise(resolve=>setTimeout(resolve,ms));
        
        function initGame()
        {
            mafiaCount = Math.floor((Game.level*40-20) * mafiaRatio)
            civilianCount = (Game.level*40-20) - mafiaCount - captainCount; 
            Game.players = []; 
            for (let i = 0; i < mafiaCount; i++) {
                Game.players.push({
                    id: 0, 
                    role: 'mafia',
                    isAlive:1 
                });
            }
            Game.players.push({
                id: 0,
                role: 'captain',
                isAlive:1
            });
            for (let i = 0; i < civilianCount; i++) { 
                Game.players.push({
                    id: 0,
                    role: 'civilian',
                    isAlive:1
                });
            }
            Game.players.sort(() => Math.random() - 0.5);
            Game.players.forEach((player, index) => {
                player.id = index + 1; 
            });
            Game.gameStarted = true;
            getNewCount();
            renderPlayersStatus();
        }
        function checkInput()
        {
            input = document.getElementById('playerInput').value.trim();
            if(!input||isNaN(input)) 
            {
                document.getElementById('AIresponse').textContent='请输入有效的成员编号(例如3)';
                return;
            }
            const targetPlayer = Game.players.find(player=>player.id===Number(input));
            if (!targetPlayer) {
                document.getElementById('AIresponse').textContent=`你似乎输入错了`;
                document.getElementById('moveOut').style.display="none";
                return;
            }
            if (targetPlayer.isAlive!=1)
            {
                document.getElementById('AIresponse').textContent=`成员${input}被淘汰/移除,无法回应`;
                document.getElementById('moveOut').style.display="none";
                return;
            }
            let result=getResponse(Number(input));
            console.log(result);
            document.getElementById('AIresponse').innerHTML=result;
            renderPlayersStatus();
            document.getElementById('moveOut').style.display="inline";
            document.getElementById('checkBtn').style.display="inline";
            resetAllColors();
            highlightTargetAndNeighbors(Number(input));
        }
        function renderPlayersStatus()
        {
            const container = document.getElementById('playersStatus');
            container.innerHTML = ''; 
            let row = document.createElement('div');
            row.style.marginBottom = '10px';

            Game.players.forEach((player, index) =>
            {
                if (index > 0 && index % 10 == 0) {
                    container.appendChild(row);
                    row = document.createElement('div');
                    row.style.marginBottom = '9px';
                }
                const l = document.createElement('div');
                l.className = 'member-label';
                l.innerHTML = `<div style="font-weight:bold;">#${player.id}</div>`;
                setTimeout(()=>
                {
                    if(usedToday.has(player.id))
                    {
                        l.classList.add('used');
                    }
                    else if(player.isAlive==1)
                    {
                        l.classList.add('alive');
                    }
                    else if(player.isAlive==2)
                    {
                        l.classList.add('move-out');
                    }
                    else
                    {
                        l.classList.add('dead');
                    }
                },20);
                row.appendChild(l);
            });

            container.appendChild(row);
        }
        function resetAllColors()
        {
            Game.players.forEach((p,index)=>{
                const el = document.querySelectorAll(".member-label")[index];
                if (!el) return;
                if(usedToday.has(p.id))
                {
                    el.className='member-label used';
                    return;
                }
                if (p.isAlive==1)
                {
                    el.className='member-label alive';
                }
                else if (p.isAlive==2)
                {
                    el.className='member-label move-out';
                }
                else
                {
                    el.className='member-label dead';
                }
            });
        }
        function highlightTargetAndNeighbors(playerId)
        {
            const labels = document.querySelectorAll(".member-label");
            const tIdx = Game.players.findIndex(p => p.id === playerId);
            if (tIdx >= 0) labels[tIdx].style.color = "#66acaf";
            const neighbors = [_up(playerId), _down(playerId), _left(playerId), _right(playerId)];
            neighbors.forEach(nid =>
            {
                if (nid === 1234)return;
                const np = Game.players.find(p => p.id === nid);
                const nIdx = Game.players.findIndex(p => p.id === nid);
                if (nIdx >= 0 && np && np.isAlive === 1)
                { 
                    labels[nIdx].style.color = "#7d5cbc";
                }
            });
        }
        function getResponse(playerId)
        {
            ans="以下是成员对话:"; 
            if(usedToday.has(Number(input)))return `${playerId}:我今天被你问过了啊`;
            usedToday.add(Number(input));
            let p=Game.players.find(player=>player.id===Number(playerId));
            if (p.role === "civilian")
            {
                ans+=Math.random()>0.5 
                    ?`<p style='color:#66acaf'>${playerId}:我是好人,你别误解我了</p>` 
                    :`<p style='color:#66acaf'>${playerId}:我...我是一个好人!绝对不是坏人`;
            }
            else if (p.role=="mafia")
            {
                ans+=Math.random()>0.9 
                    ?`<p style='color:#66acaf'>${playerId}:我...我是一个坏人!...不是,是好人!</p>`
                    :Math.random()>0.7
                    ?`<p style='color:#66acaf'>${playerId}:我...我是一个好人!绝对不是坏人</p>`
                    :`<p style='color:#66acaf'>${playerId}:我是好人,你别误解我了</p>`
            }
            else if (p.role=="captain")
            {
                ans+=`提示:${playerId}为好人队长`;
            }
            if(captainCount>0)captainHint(playerId);
            for(const pid of [_up(playerId),_down(playerId),_left(playerId),_right(playerId)])
            {
                var person=Game.players.find(p=>p.id==pid);
                if(!person||person.isAlive!=1||Math.random<1/2)continue;
                if(person.role=="captain")ans+=captainHint(playerId);
                else if(person.role=="civilian")
                {
                    ans+=`<p style='color:#7d5cbc'>${person.id}:${playerId}是${p.role=="mafia"?"坏人":"好人"}</p>`;
                }
                else
                {
                    ans+=`<p style='color:#7d5cbc'>${person.id}:${playerId}是${p.role=="mafia"?"好人":"坏人"}</p>`;
                }
            }
            return ans;
        }
        function captainHint(playerId)
        {
            const captain=Game.players.find(p=>p.role=="captain"&&p.isAlive==1);
            if(captain&&playerId!=captain&&playerId!=_left(captain)&&
            playerId!=_right(captain)&&playerId!=_up(captain)&&playerId!=_down(captain))return "";
            var res="";
            let randChance=Math.random();
            if(randChance>0.93)
            {
                res+=`<br>[队长]${captain.id}:成员${playerId}疑似[${p.role=="mafia"?"坏人":"好人"}]`;
            }
            else if(randChance>0.85)
            {
                let fakeRole=Math.random()>0.3?"好人":"坏人";
                res+=`<br>[队长]${captain.id}:成员${playerId}疑似[${fakeRole}]`;
            }
            return res;
        }
        function renderPlayersStatus() {
            const container = document.getElementById('playersStatus');
            container.innerHTML = ''; 
            let row = document.createElement('div');
            row.style.marginBottom = '10px';
            Game.players.forEach((player, index)=>
            {
                if (index > 0 && index % 10 == 0) {
                    container.appendChild(row);
                    row = document.createElement('div');
                    row.style.marginBottom = '9px';
                }
                const l = document.createElement('div');
                l.className=`member-label`;
                l.classList.add('alive'); 
                if (player.isAlive === 1)
                {
                    l.classList.replace('alive', 'alive'); 
                }
                else if (player.isAlive === 2)
                {
                    l.classList.replace('alive', 'move-out');
                } else {
                    l.classList.replace('alive', 'dead');
                }
                l.innerHTML=`<div style="font-weight:bold;">#${player.id}</div>`;
                row.appendChild(l);
            });
            container.appendChild(row);
        }
        function killRandomPlayer()
        {
            if(!Game.gameStarted)return;
            const alivePlayers=Game.players.filter(p=>p.isAlive==1);
            let aliveCivilianPlayers;
            if(Math.random()<=0.95)aliveCivilianPlayers=Game.players.filter(p => p.role=="civilian"&&p.isAlive==1);
            else aliveCivilianPlayers=Game.players
            const aliveNonMafia=alivePlayers.filter(p => p.role!=="mafia");
            const target=aliveNonMafia.length > 0 ? aliveNonMafia : alivePlayers;
            const randomIndex=Math.floor(Math.random()*target.length);
            target[randomIndex].isAlive=0;
            renderPlayersStatus();
        }
        function getNewCount()
        {
            civilianCount=0;
            mafiaCount=0;
            captainCount=0;
            Game.players.forEach(player => {
                if (player.isAlive==1) {
                    switch (player.role) {
                        case 'civilian':
                            civilianCount++;
                            break;
                        case 'mafia':
                            mafiaCount++;
                            break;
                        case 'captain':
                            captainCount++;
                            break;
                        default:
                            console.warn(`!未知角色${player.role}!`);
                    }
                }
            });
            if(mafiaCount==0)
            {
                alert("坏人被清除了,组织回归了安宁...");
                Game.level++;
                if(line=="unlimited")
                {
                    alert("但是你又发现另一个组织也有同样的症状发生...");
                    return;
                }
                if(Game.level==2)
                {
                    alert("但是你又发现另一个组织也有同样的症状发生...");
                    alert("组织的队长:看你居然把我们的合作组织的坏人找出来了");
                    alert("队长:那么现在,你也帮我们找找!");
                    if(confirm("你愿意帮组织吗?"))alert("你看着3倍体量的组织,点了点头");
                    else
                    {
                        line="stay"
                        alert("队长:坏人太多了,我们没好人了!");
                        alert("于是组织解散了,但...");
                        alert("但是最初的组织又遇到了麻烦");
                        alert("最初组织的队长:现在坏人又潜入了组织");
                    }
                }
                if(Game.level==3)
                {
                    alert("三年之后")
                    alert("组织中新的队长:我组织已经历多轮淘汰,坏人仍在暗处,侦探,请继续你的排查!")
                }
                if(Game.level==4)
                {
                    if(line=="main")
                    {
                        if(confirm("你接到了一个电话,好像是另一个组织打给你的...你要接吗?"))
                        {
                            alert("电话:有人在吗?我是组织的队长");
                            alert("组织的队长:你把两个组织的坏人都找出来了,这一次,组织体量比上次大40%");
                        }
                        else
                        {
                            alert("达成结局1:到此为止")
                            alert("结局后开启无尽模式");
                            line="unlimited";
                        }
                    }
                    else
                    {
                        alert("但是你又发现另一个组织也有同样的症状发生...")
                        alert("组织的队长:你把好多坏人都找出来了,这一次,组织体量比上次大40%");
                    }
                    alert("队长:据我所知,这个组织和之前的坏人是一伙的!")
                    alert("于是,你开始帮队长...")
                }//Coming soon...
                document.getElementById("gameLevel").innerText = `第${Game.level}关`;
                initGame();
            }
            if(civilianCount<=10)
            {
                initGame();
                if(line=="unlimited")return;
                alert("坏人还是赢了");
                alert("你眼前的画面骤然模糊,在睁眼的瞬间碎成一片虚无");
                alert("原来只是一场梦")
                alert("你又回到了刚刚接手那个案子时...")
            }
        }
        function day()
        {
            dayCount++;
            document.getElementById("AIresponse").textContent=`第${dayCount}天`;
            document.body.style.backgroundColor="white";
            document.getElementById("day").style.display="block"; 
            usedToday=new Set();
        }
        async function night()
        {
            document.getElementById("AIresponse").textContent=`天黑了,坏人开始行动...(第${dayCount}夜)`;
            document.body.style.backgroundColor="black";
            document.getElementById("day").style.display="none";
            for(let i=1;i<=Math.ceil(mafiaCount*(Math.random()));i++)
            {
                killRandomPlayer();
                getNewCount();
                await delay(800); 
            }
            day();
        }
        function _left(x) {
            if (typeof x !== 'number' || x < 1) return 1234;
            const total = Game.level * 40 + 20; 
            if (x > total) return 1234;
            return x - 1 >= 1 ? x - 1 : 1234;
        }
        function _right(x) {
            if (typeof x !== 'number' || x < 1) return 1234;
            const total = Game.level * 40 + 20;
            if (x >= total) return 1234;
            return x + 1;
        }
        function _up(x) {
            if (typeof x !== 'number' || x < 1) return 1234;
            const res = x - 10;
            return res >= 1 ? res : 1234;
        }
        function _down(x) {
            if (typeof x !== 'number' || x < 1) return 1234;
            const total = Game.level * 40 + 20; 
            const res = x + 10;
            return res <= total ? res : 1234;
        }//这行代码是gen-ai写的
        initGame();
    </script>
</body>
</html>
